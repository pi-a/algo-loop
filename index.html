<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛸 Adventures of an Alien Baby The Tooth Loop - How to Brush Teeth?</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════
       DESIGN TOKENS
    ════════════════════════════════════════════════════ */
    :root {
      --bg:#090716; --surface:#12102a; --surface2:#1c1838; --surface3:#251f48;
      --green:#39ff14; --yellow:#ffd93d; --pink:#ff6b9d;
      --blue:#4cc9f0; --purple:#c77dff; --orange:#ff9f43; --teal:#55efc4;
      --red:#ff6b6b;
      --text:#e8e0ff; --text-dim:#8880bb;
      --border:rgba(99,88,200,.25); --border2:rgba(99,88,200,.45);
      --shadow:0 8px 40px rgba(0,0,0,.6);
      --radius:18px; --radius-sm:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* Starfield canvas sits behind everything */
    #star-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

    /* App shell */
    #app{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:20px 20px 60px;}

    /* ── Progress bar ─────────────────────────────────── */
    #progress-wrap{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0 38px;}
    .pdot{position:relative;width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;font-family:'Baloo 2',sans-serif;color:var(--text-dim);transition:all .4s;}
    .pdot.done{background:rgba(57,255,20,.15);border-color:var(--green);color:var(--green);}
    .pdot.active{background:rgba(255,217,61,.15);border-color:var(--yellow);color:var(--yellow);transform:scale(1.16);box-shadow:0 0 18px rgba(255,217,61,.4);}
    .pdot-line{flex:1;max-width:44px;height:2px;background:var(--border);border-radius:2px;}
    .pdot-label{position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);font-size:.6rem;white-space:nowrap;color:var(--text-dim);}
    .pdot.active .pdot-label{color:var(--yellow);} .pdot.done .pdot-label{color:var(--green);}

    /* ── Pages ────────────────────────────────────────── */
    .page{display:none;animation:fadeUp .45s ease both;}
    .page.active{display:block;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}

    /* ── Cards ────────────────────────────────────────── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:18px;box-shadow:var(--shadow);}

    /* ── Typography ───────────────────────────────────── */
    h1,h2,h3,h4{font-family:'Baloo 2',sans-serif;}
    h1{font-size:2.1rem;font-weight:800;line-height:1.2;margin-bottom:8px;background:linear-gradient(120deg,var(--teal) 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    h2{font-size:1.5rem;font-weight:700;color:var(--yellow);margin-bottom:10px;}
    h3{font-size:1.1rem;font-weight:700;color:var(--blue);margin-bottom:8px;}
    h4{font-size:.9rem;font-weight:700;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
    .story{font-size:1rem;line-height:1.85;color:var(--text);margin-bottom:12px;}
    .story em{color:var(--yellow);font-style:normal;font-weight:700;}
    .story b{color:var(--green);}

    /* ── Buttons ──────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:50px;border:none;cursor:pointer;font-family:'Baloo 2',sans-serif;font-size:.97rem;font-weight:700;transition:all .2s;}
    .btn-primary{background:linear-gradient(135deg,var(--teal) 0%,var(--blue) 100%);color:#080616;box-shadow:0 4px 20px rgba(76,201,240,.3);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(76,201,240,.5);}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
    .btn-ghost:hover{border-color:var(--blue);color:var(--blue);}
    .btn-ghost:disabled{opacity:.4;cursor:not-allowed;}
    .btn-sm{padding:7px 16px;font-size:.82rem;}
    .nav{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}

    /* ── Name input (page 1) ──────────────────────────── */
    .name-input{background:var(--surface2);border:2px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'Baloo 2',sans-serif;font-size:1.5rem;font-weight:700;padding:12px 18px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s;}
    .name-input:focus{border-color:var(--teal);box-shadow:0 0 16px rgba(85,239,196,.2);}
    .name-input::placeholder{color:var(--text-dim);font-weight:400;font-size:1.1rem;}
    .name-preview{min-height:28px;font-family:'Baloo 2',sans-serif;font-size:1.1rem;color:var(--teal);margin-top:8px;font-weight:700;}
    .name-fg label{display:block;font-weight:700;margin-bottom:8px;font-size:.95rem;}
    .name-fg{margin-top:20px;}
    hr.sep{border:none;border-top:1px solid var(--border);margin:20px 0;}

    /* ── Page 2: sequential true/false questions ─────── */
    .p2-block{margin-bottom:22px;animation:fadeUp .35s ease;}
    .p2-block.hidden{display:none;}
    .p2-qnum{font-size:.72rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
    .p2-stmt{font-size:1rem;font-weight:600;line-height:1.65;color:var(--text);padding:14px 16px;margin-bottom:14px;background:var(--surface2);border-radius:var(--radius-sm);border-left:4px solid var(--blue);}
    .p2-stmt em{color:var(--yellow);font-style:normal;font-weight:700;}
    .p2-opts{display:flex;gap:10px;flex-wrap:wrap;}
    .p2-opt{flex:1;min-width:150px;padding:12px 16px;background:var(--surface2);border:2px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-size:.92rem;font-weight:600;line-height:1.4;transition:all .2s;}
    .p2-opt:hover:not(.revealed){border-color:var(--blue);color:var(--blue);transform:translateY(-2px);}
    .p2-opt.revealed.correct{border-color:var(--green);background:rgba(57,255,20,.07);color:var(--green);cursor:default;}
    .p2-opt.revealed.incorrect{border-color:rgba(255,107,107,.3);opacity:.6;cursor:default;}
    .p2-why{font-size:.8rem;color:var(--text-dim);margin-top:5px;line-height:1.4;display:none;font-style:italic;}
    .p2-opt.revealed .p2-why{display:block;}
    .p2-opt.revealed.correct .p2-why{color:var(--teal);font-style:normal;}
    .p2-fb{display:none;font-size:.9rem;line-height:1.6;padding:12px 14px;margin-top:12px;border-radius:var(--radius-sm);}
    .p2-fb.show{display:block;}
    .p2-fb.correct{background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.25);color:var(--teal);}
    .p2-fb.wrong{background:rgba(255,217,61,.06);border:1px solid rgba(255,217,61,.2);color:var(--yellow);}

    /* ── Page 3: three-option MCQ ─────────────────────── */
    .opts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0 0;}
    @media(max-width:560px){.opts-grid{grid-template-columns:1fr;}}
    .opt-card{background:var(--surface2);border:2px solid var(--border2);border-radius:var(--radius);padding:16px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;transition:border-color .2s,background .2s,transform .2s;user-select:none;}
    .opt-card:hover:not(.revealed){border-color:var(--blue);transform:translateY(-3px);}
    .opt-card.revealed.correct{border-color:var(--green);background:rgba(57,255,20,.05);cursor:default;}
    .opt-card.revealed.incorrect{border-color:rgba(255,107,107,.35);opacity:.7;cursor:default;}
    .opt-img{position:relative;width:100%;height:110px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02);border-radius:8px;}
    .opt-img img,.opt-img svg{max-width:100%;max-height:100px;object-fit:contain;}
    .opt-verdict{display:none;font-size:1.3rem;position:absolute;top:-8px;right:-8px;}
    .opt-card.revealed .opt-verdict{display:block;}
    .opt-label{font-weight:700;font-size:.9rem;color:var(--text);line-height:1.3;}
    .opt-desc{font-size:.78rem;color:var(--text-dim);line-height:1.45;}
    .opt-why{font-size:.75rem;color:var(--text-dim);font-style:italic;line-height:1.4;display:none;}
    .opt-card.revealed .opt-why{display:block;}
    .opt-card.revealed.correct .opt-why{color:var(--teal);font-style:normal;}
    .fb-box{border-radius:var(--radius-sm);padding:16px 18px;margin-top:20px;display:flex;gap:14px;align-items:flex-start;animation:fadeUp .3s ease;}
    .fb-box.ok{background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.3);}
    .fb-box.bad{background:rgba(255,217,61,.06);border:1px solid rgba(255,217,61,.25);}
    .fb-ico{font-size:1.8rem;flex-shrink:0;}
    .fb-text{font-size:.93rem;line-height:1.65;color:var(--text);}
    .fb-text b{color:var(--green);} .fb-text em{color:var(--yellow);font-style:normal;}

    /* ── Page 4: teeth display ────────────────────────── */
    /*
      The mouth is a dark rounded div containing two rows of tooth-shaped
      elements separated by gum bands. All visual state is expressed as
      CSS class swaps on .tooth-body: s-default / s-hint / s-done / s-all.
      No style="" is ever written by JS — only classList changes.
    */
    .mouth-outer{display:flex;justify-content:center;margin:22px 0;}
    .mouth-inner{display:inline-flex;flex-direction:column;align-items:stretch;background:#0c0008;border-radius:28px;padding:18px 28px 22px;border:2px solid rgba(200,80,130,.28);box-shadow:inset 0 0 40px rgba(120,0,50,.3),var(--shadow);}
    .teeth-row{display:flex;gap:8px;justify-content:center;}
    .gum{height:13px;margin:3px 0;background:linear-gradient(180deg,#c56080,#7a2040);border-radius:6px;}
    .gum.gum-top{border-radius:0 0 8px 8px;margin-top:0;}
    .gum.gum-bottom{border-radius:8px 8px 0 0;margin-bottom:0;}

    .tooth-wrap{cursor:pointer;display:flex;flex-direction:column;align-items:center;transition:transform .15s;}
    .tooth-wrap:hover:not(.tw-done){transform:translateY(-4px);}
    .tooth-wrap.tw-done{cursor:default;}

    .tooth-body{width:54px;height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:2.5px solid #c8c0a0;background:#f5f0de;transition:background .2s,border-color .2s,box-shadow .2s;}
    /* Top teeth: flat top (attached to gum), rounded bottom */
    .tooth-body.tooth-top{border-radius:2px 2px 14px 14px;border-top:none;}
    /* Bottom teeth: rounded top, flat bottom */
    .tooth-body.tooth-bottom{border-radius:14px 14px 2px 2px;border-bottom:none;}

    /* ── Four tooth states ─────────────────────────────── */
    .tooth-body.s-default{background:#f5f0de;border-color:#c8c0a0;}
    .tooth-body.s-hint{background:#fff8d0;border-color:var(--yellow);box-shadow:0 0 20px rgba(255,217,61,.7);animation:tpulse 1.1s ease infinite;}
    @keyframes tpulse{0%,100%{box-shadow:0 0 10px rgba(255,217,61,.5);}50%{box-shadow:0 0 28px rgba(255,217,61,.95);}}
    .tooth-body.s-done{background:rgba(57,255,20,.15);border-color:var(--green);}
    .tooth-body.s-all{background:rgba(57,255,20,.28);border-color:var(--green);box-shadow:0 0 14px rgba(57,255,20,.35);}
    @keyframes twrong{0%,100%{background:#f5f0de;border-color:#c8c0a0;}40%{background:rgba(255,80,80,.45);border-color:var(--red);}}
    .tooth-body.s-wrong{animation:twrong .55s ease;}

    /* Labels inside tooth-body */
    .tooth-pos,.tooth-num,.tooth-step{font-family:'Baloo 2',sans-serif;font-weight:800;line-height:1;pointer-events:none;text-align:center;}
    .tooth-pos{font-size:.68rem;color:#a09070;}
    .tooth-num{font-size:1.35rem;color:#4cc9f0;}
    .tooth-step{font-size:1.1rem;color:#2bc40f;display:none;}
    /* When done: shrink the static label, reveal the step number */
    .tooth-body.s-done .tooth-pos,.tooth-body.s-done .tooth-num{font-size:.56rem;opacity:.4;}
    .tooth-body.s-done .tooth-step{display:block;}

    /* Step progress dots */
    .step-dots{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;}
    .sdot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);transition:all .25s;}
    .sdot.sd-done{background:var(--green);border-color:var(--green);}
    .sdot.sd-cur{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 8px rgba(255,217,61,.6);}
    .step-label{text-align:center;font-size:.8rem;font-weight:700;color:var(--text-dim);margin-top:6px;}

    /* Instruction bubble */
    .instr-wrap{display:flex;align-items:flex-start;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
    .instr-ai{min-width:80px;flex-shrink:0;display:flex;align-items:flex-end;}
    .instr-ai img,.instr-ai svg{max-width:80px;}
    .instr-bubble{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px 16px;position:relative;font-size:.93rem;line-height:1.65;color:var(--text);}
    .instr-bubble::before{content:'';position:absolute;left:-10px;top:22px;border:6px solid transparent;border-right-color:var(--border2);}
    .instr-bubble em{color:var(--yellow);font-style:normal;font-weight:700;}
    .instr-bubble b{color:var(--teal);}
    .instr-title{font-family:'Baloo 2',sans-serif;font-weight:700;color:var(--yellow);font-size:.87rem;margin-bottom:8px;}

    .round-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
    .round-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(76,201,240,.1);border:1px solid rgba(76,201,240,.3);border-radius:20px;padding:4px 16px;font-size:.83rem;color:var(--blue);font-weight:700;margin-bottom:14px;}

    /* Round success message */
    .round-ok{background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.3);border-radius:var(--radius);padding:22px;text-align:center;margin-top:16px;animation:fadeUp .4s ease;}
    .round-ok p{font-size:.95rem;color:var(--text);line-height:1.65;margin-bottom:14px;}
    .round-ok p em{color:var(--yellow);font-style:normal;font-weight:700;}
    .round-ok p b{color:var(--green);}
    .ok-ico{font-size:2rem;display:block;margin-bottom:8px;}

    /* ── Page 5: lesson ───────────────────────────────── */
    .medal{font-size:3.5rem;display:block;margin-bottom:10px;text-align:center;}
    .pc-wrap{background:#0a0820;border:1px solid rgba(76,201,240,.25);border-radius:var(--radius-sm);padding:16px 22px;margin:14px 0;overflow-x:auto;}
    .pc-wrap pre{font-family:'Courier New',monospace;font-size:.88rem;color:#c8e0ff;line-height:1.75;white-space:pre;margin:0;}
    .pc-kw{color:#c77dff;} .pc-fn{color:#ffd93d;} .pc-br{color:#55efc4;} .pc-cm{color:#4a7a5a;}
    .hl-box{background:rgba(76,201,240,.07);border:1px solid rgba(76,201,240,.25);border-radius:var(--radius-sm);padding:14px 16px;margin:14px 0;}

    /* Confetti */
    .confetti-piece{position:fixed;border-radius:2px;pointer-events:none;animation:cfall linear forwards;}
    @keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(720deg);opacity:0;}}

    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
    @media print{#star-canvas,#progress-wrap,.nav,.btn,.round-controls{display:none!important;}body{background:white;color:black;}.card{box-shadow:none;border:1px solid #ccc;}}
  </style>
</head>
<body>
<canvas id="star-canvas"></canvas>
<div id="app">
  <div id="progress-wrap"></div>
  <div class="page active" id="pg1"></div>
  <div class="page"        id="pg2"></div>
  <div class="page"        id="pg3"></div>
  <div class="page"        id="pg4"></div>
  <div class="page"        id="pg5"></div>
</div>

<!-- ═══════════════════════════════════════════════════════
  STORY TEXT
════════════════════════════════════════════════════════ -->
<script type="text/yaml" id="story-data">

page1:
  title: "The Tooth Loop <span class='ei'>🦷</span>"
  heading: "<span class='ei'>🛸</span> <em>{name}</em> Wants to Learn to Brush!"
  paragraphs:
    - "You are brushing your teeth and want to teach the <em>baby alien</em> to do the same thing. You wonder, \"What if I teach the <em>baby alien</em> about brushing one tooth from the gum to the bottom of the tooth? Can it then brush the rest of its teeth following my instruction? How will it know which teeth it has brushed?\""
    - "The <em>baby alien</em> has only 8 teeth, four on top and four on bottom. If it starts brushing without any followable pattern then it will never know which teeth it brushed."
    - "You wonder, \"Can I teach it to do a proper brushing for one tooth and then it repeats it for all until every tooth is brushed?\" This is called a <b>for-loop</b> in computer programming. Why a <b>for-loop</b>? Because you repeat the same thing <b>for</b> as many times as necessary."
  name_label: "✏️ Give your alien a name:"
  name_placeholder: "e.g. Zorp, Pip, Nova…"
  name_greeting: "👾 Hello, <em>{name}</em>! Let's loop through those teeth!"
  next_button: "Start the lesson! 🦷"

page2:
  heading: "<b>First</b>, Let's Think It Through…"
  intro: "<em>{name}</em> has 8 teeth — 4 on top, 4 on the bottom. Before writing any rules, let's think about <em>why</em> rules matter at all."
  q1:
    number: "Question 1"
    statement: "<em>{name}</em> decides to brush randomly — no plan, just moving the brush wherever feels right. It finishes and thinks: <em>\"I must have covered every tooth by now.\"</em> Is that a safe assumption?"
    options:
      yes:
        label: "✅ Yes — random is fine!"
        why: "Think again! Without a plan, <em>{name}</em> could brush the same tooth five times and completely skip another. There is nothing keeping track."
      no:
        label: "❌ No — it could miss teeth!"
        why: "Correct! Without a rule, <em>{name}</em> has no way of knowing which teeth it already brushed. Some could stay dirty forever!"
    correct: "no"
    feedback_correct: "Right! Random brushing offers no guarantee. <em>{name}</em> could circle back to the same tooth again and again while another stays dirty. Without a rule, there is simply no way to be sure."
    feedback_wrong: "Think carefully: if <em>{name}</em> just moves the brush wherever feels right, what stops it from brushing the same tooth twice while completely missing another? Nothing is keeping track!"
  q2:
    number: "Question 2"
    statement: "If <em>{name}</em> follows a clear rule — for example: <em>\"start top-left, go right, then bottom-left, go right\"</em> — it can guarantee every tooth is brushed exactly once."
    options:
      yes:
        label: "✅ True — rules guarantee it!"
        why: "Correct! A clear rule tells <em>{name}</em> exactly where to go next. No tooth gets skipped, no tooth gets brushed twice."
      no:
        label: "❌ False — rules don't help"
        why: "Actually, rules help a lot! Any rule that visits every tooth exactly once is a complete guarantee — no tooth left behind."
    correct: "yes"
    feedback_correct: "Exactly! A rule is a guarantee. \"Left to right, top then bottom\" — if <em>{name}</em> follows it completely, every single tooth gets covered. That is what <b>algorithms</b> do: they remove uncertainty."
    feedback_wrong: "Think of it like a shopping list in <b>order</b>. If you follow the list from top to bottom, you are guaranteed to get every item. A tooth-brushing rule works the same way!"
  next_button: "I'm convinced — show me the methods! →"

page3:
  heading: "Which Method Guarantees Clean Teeth?"
  subtitle: "Both methods below follow a rule. Does it matter <em>which</em> rule <em>{name}</em> picks, or does any complete rule work?"
  options:
    row_order:
      label: "Row by Row"
      desc: "Top row left→right: T1, T2, T3, T4. Then bottom row left→right: B1, B2, B3, B4."
      why: "This works! A left-to-right scan of each row covers every tooth exactly once."
    numbered:
      label: "By the Numbers"
      desc: "Take a photo of the <em>baby alien</em>'s teeth, write a unique number 1–8 on each tooth (any <b>order</b>) on the photo. Brush #1, then #2, up to #8."
      why: "This also works! Following unique numbers 1→8 guarantees every tooth is covered."
    both:
      label: "Both work! ✓"
      desc: "Any rule that visits every tooth exactly once — in any <b>order</b> — guarantees a full clean."
      why: "Correct! The method doesn't matter. What matters is that the rule visits every item exactly once."
  correct: "both"
  feedback_correct: "Exactly right! Both are valid <b>algorithms</b>. The key insight is not <em>which</em> <b>order</b> you use — it is that the rule must visit every item in the collection. In programming, we call this a <b>for-loop</b>: repeat an action <b>for</b> each item in a list, making sure no item is ever skipped."
  feedback_wrong: "Think about it: if <em>{name}</em> follows either rule perfectly and completely, can it ever miss a tooth? Can it ever brush a tooth twice? If both guarantee full coverage, maybe both are valid…"
  next_button: "Time to practice clicking teeth! 🦷"

page4:
  heading: "<span class='ei'>🦷</span> Practice Time — Follow the Rule!"
  intro: "Click the teeth in exactly the <b>order</b> the rule describes. Use the hint button if you get stuck — it will highlight the next tooth to click in yellow."
  rounds:
    row_order:
      badge: "Round 1 of 4"
      title: "Row by Row"
      instruction: "Start at the top row, click from left to right: T1 → T2 → T3 → T4. Then move to the bottom row and again click left to right: B1 → B2 → B3 → B4."
      success: "🎉 Perfect! <em>{name}</em> brushed all 8 teeth by going left-to-right, row by row. This is a classic <b>for-loop</b> — visiting every item in a neat, predictable <b>order</b>!"
    numbered_asc:
      badge: "Round 2 of 4"
      title: "By the Numbers (1 → 8)"
      instruction: "Each tooth has been given a random number between 1 and 8 — no two teeth share a number. Find the tooth marked #1 and click it <b>first</b>. Then #2, then #3 — keep going until you reach #8."
      success: "🔢 Brilliant! <em>{name}</em> followed the numbers 1→8 and brushed every tooth. The numbers act like an index — a way to label every item in a list so you can visit them all in <b>order</b>!"
    zigzag:
      badge: "Round 3 of 4"
      title: "The Zigzag Rule"
      instruction: "This rule zigzags between rows — unusual, but complete! Follow this exact <b>order</b>: Top row right side: T4 → T3. Then Bottom row left side: B1 → B2. Then Top row left side: T2 → T1. Finally Bottom row right side: B3 → B4."
      success: "🌟 Incredible! Even this unusual zigzag covered all 8 teeth — because the rule was complete. In computer science, any loop that visits every item exactly once is valid, no matter the <b>order</b>!"
    numbered_desc:
      badge: "Round 4 of 4"
      title: "By the Numbers (8 → 1)"
      instruction: "New random numbers — all different again! But this time start from the tooth marked #8 and count downwards: 8 → 7 → 6 → … all the way to #1. A reversed loop is still a valid loop!"
      success: "⬇️ Excellent! Counting backwards from 8 to 1 still covered every tooth. The direction of a loop — forwards or backwards — doesn't matter, as long as every item is visited exactly once!"
  hint_on:  "💡 Show hint"
  hint_off: "💡 Hide hint"
  reset:    "↺ Restart round"
  step_label: "{done} / {total} teeth brushed"
  all_done: "🦷✨ All 8 teeth clean!"
  next_round: "Next Round →"
  finish: "See the big lesson! 🎓"

page5:
  heading: "<span class='ei'>🎓</span> <em>{name}</em> Learned About For-Loops!"
  intro_heading: "The Big Idea"
  paragraphs:
    - "A <b>for-loop</b> is an instruction that says: <em>\"for each item in a collection, do this action.\"</em> What <em>{name}</em> just practiced was exactly that — <b>for</b> each tooth in the mouth, brush it."
    - "The loop does not care about the <b>order</b> — left-to-right, by number, zigzag, or even backwards — as long as the rule visits every item exactly once and stops when all items are done, it is a valid <b>for-loop</b>. The guarantee of completeness is what makes it powerful."
    - "In real programs, a <b>for-loop</b> might say: <b>for</b> each photo in your camera roll, apply a filter. Or: <b>for</b> each student in the class list, send an email. The shape is always the same — a collection, one action, every item visited."
  pseudocode_intro: "In a programming language, what <em>{name}</em> did looks like this:"
  pc_c1: "# Method 1 — left to right, row by row"
  pc_l1: "teeth = [T1, T2, T3, T4, B1, B2, B3, B4]"
  pc_c2: "# Method 2 — numbered (any order, all 8 present)"
  pc_l2: "teeth = [T3, B2, T1, B4, T4, B1, T2, B3]  # shuffled but complete"
  ingredients_heading: "Every <b>for-loop</b> has exactly three ingredients:"
  ingredients:
    - "📋 A collection — the list of things to process (our 8 teeth)"
    - "🔁 An action — what to do to each one (brush it)"
    - "✅ A stopping condition — when every item has been visited, the loop ends automatically"
  math_note: "In maths, the <b>for-loop</b> idea appears as the Sigma (Σ) symbol, which means 'add this up <b>for</b> every value from 1 to n'. The loop structure is one of the most universal ideas across all of mathematics and computer science."
  restart_btn: "🔄 Start the adventure again!"

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  STATIC DATA
// ═══════════════════════════════════════════════════════════════════════

/**
 * TEETH — 8 teeth in their visual layout order (left-to-right within each row).
 * t0=T1(top-left) … t3=T4(top-right), b0=B1(bottom-left) … b3=B4(bottom-right).
 */
const TEETH = [
  { id:'t0', row:'top',    label:'T1' },
  { id:'t1', row:'top',    label:'T2' },
  { id:'t2', row:'top',    label:'T3' },
  { id:'t3', row:'top',    label:'T4' },
  { id:'b0', row:'bottom', label:'B1' },
  { id:'b1', row:'bottom', label:'B2' },
  { id:'b2', row:'bottom', label:'B3' },
  { id:'b3', row:'bottom', label:'B4' },
];

/**
 * ROUNDS — four brushing exercises in pedagogical order.
 *
 * type:'fixed'    → the correct click sequence is given by the `seq` array.
 * type:'numbered' → a random number 1-8 is assigned to each tooth at
 *                   runtime; the sequence is derived from those numbers.
 * dir:'asc'       → numbered round clicks lowest number first (1→8).
 * dir:'desc'      → numbered round clicks highest number first (8→1).
 *
 * The zigzag sequence encodes the exact rule the user described:
 *   Top row right half (T4→T3) → Bottom row left half (B1→B2)
 *   → Top row left half (T2→T1) → Bottom row right half (B3→B4)
 * Every tooth appears exactly once — a complete, valid for-loop.
 */
const ROUNDS = [
  { id:'row_order',    type:'fixed',    seq:['t0','t1','t2','t3','b0','b1','b2','b3'] },
  { id:'numbered_asc', type:'numbered', dir:'asc'  },
  { id:'zigzag',       type:'fixed',    seq:['t3','t2','b0','b1','t1','t0','b2','b3'] },
  { id:'numbered_desc',type:'numbered', dir:'desc' },
];

// ═══════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════
let STORY     = {};
let alienName = '';
let curPage   = 1;

// Page 2: two sequential questions
let p2 = {
  q1: { answered:false, selected:null },
  q2: { answered:false, selected:null },
};

// Page 3: single MCQ
let p3 = { answered:false, selected:null };

// Page 4: interactive rounds
let p4 = {
  roundIdx : 0,
  done     : [false,false,false,false], // which rounds are complete
  seq      : [],   // expected tooth-id click sequence for current round
  clicked  : [],   // correct clicks made so far in current round
  numbers  : null, // { toothId → assignedNumber } for numbered rounds
  hintOn   : false,
};

// ═══════════════════════════════════════════════════════════════════════
//  STORY / TEXT SYSTEM
// ═══════════════════════════════════════════════════════════════════════

/** Returns the YAML value at `path` (dot-separated), substituting {vars}. */
function t(path, vars = {}) {
  const sub = (s) => String(s).replace(/\{(\w+)\}/g,
    (_, k) => vars[k] !== undefined ? vars[k] : `{${k}}`);
  const keys = path.split('.');
  let v = STORY;
  for (const k of keys) {
    if (v == null || typeof v !== 'object') return path;
    v = v[k];
  }
  if (v == null) return path;
  return Array.isArray(v) ? v.map(sub) : sub(v);
}

/** Renders a YAML string array as a series of <p class="story"> elements. */
function paras(path, vars = {}) {
  const raw  = t(path, vars);
  const list = Array.isArray(raw) ? raw : [raw];
  return list.map(p => `<p class="story">${p}</p>`).join('');
}

function deepMerge(dst, src) {
  for (const k in src) {
    if (src[k] && typeof src[k]==='object' && !Array.isArray(src[k]))
      dst[k] = deepMerge(dst[k]||{}, src[k]);
    else dst[k] = src[k];
  }
  return dst;
}

async function loadStory() {
  // Step 1: parse the embedded YAML block above
  const el = document.getElementById('story-data');
  if (el && typeof jsyaml !== 'undefined') {
    try { STORY = jsyaml.load(el.textContent) || {}; }
    catch (e) { showYamlErr(e.message); }
  }
  // Step 2: try loading story.yaml from the server (overrides embedded text)
  try {
    const r = await fetch('story.yaml');
    if (r.ok) STORY = deepMerge(STORY, jsyaml.load(await r.text()));
  } catch(_) { /* fine — no external file */ }
}

function showYamlErr(msg) {
  const d = document.createElement('div');
  d.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#f44;color:#fff;padding:12px 20px;border-radius:8px;z-index:9999;font-family:monospace;font-size:.85rem;max-width:90vw';
  d.textContent = '⚠️ YAML error: ' + msg;
  document.body.appendChild(d);
}

// ═══════════════════════════════════════════════════════════════════════
//  ASSET IMAGE SYSTEM
// ═══════════════════════════════════════════════════════════════════════
function img(name, maxW='120px', extra='') {
  return `<img src="assets/${name}.svg" onerror="imgFb(this,'${name}')"
    style="max-width:${maxW};max-height:100%;object-fit:contain;${extra}"
    alt="${name.replace(/-/g,' ')}">`;
}
function imgFb(el, name) {
  if (!el._png) {
    el._png=true;
    el.onerror=()=>imgFb(el,name);
    el.src=`assets/${name}.png`;
    return;
  }
  // Both SVG and PNG missing — replace with a labeled dashed vertical line
  const w = document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;';
  w.innerHTML=`
    <svg width="6" height="80" viewBox="0 0 6 80" xmlns="http://www.w3.org/2000/svg" style="opacity:.4">
      <line x1="3" y1="3" x2="3" y2="77" stroke="#5548aa" stroke-width="2.5"
            stroke-dasharray="5,4" stroke-linecap="round"/>
    </svg>
    <span style="font-size:7px;color:#4a3a9a;font-family:monospace;opacity:.5;
                 text-align:center;max-width:80px;word-break:break-all;line-height:1.2;">${name}</span>`;
  if (el.parentNode) el.replaceWith(w);
}

// ═══════════════════════════════════════════════════════════════════════
//  STARFIELD
// ═══════════════════════════════════════════════════════════════════════
(function(){
  const c=document.getElementById('star-canvas'), ctx=c.getContext('2d');
  let stars=[];
  function resize(){
    c.width=innerWidth; c.height=innerHeight;
    stars=Array.from({length:170},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.4+.3, a:Math.random(),
      da:(Math.random()-.5)*.008
    }));
  }
  resize(); addEventListener('resize',resize);
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a=Math.max(.1,Math.min(1,s.a+s.da));
      if(s.a<=.1||s.a>=1) s.da=-s.da;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,190,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

// ═══════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function goPage(n) {
  if (n===1) renderP1();
  if (n===2) renderP2();
  if (n===3) renderP3();
  if (n===4) renderP4();
  if (n===5) renderP5();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg'+n).classList.add('active');
  curPage=n;
  buildProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildProgress() {
  const labels=['Story','Think','Methods','Practice','Lesson'];
  const wrap=document.getElementById('progress-wrap');
  wrap.innerHTML='';
  for (let i=1;i<=5;i++) {
    const d=document.createElement('div');
    d.className='pdot'+(i===curPage?' active':i<curPage?' done':'');
    d.innerHTML=(i<curPage?'✓':i)+`<span class="pdot-label">${labels[i-1]}</span>`;
    wrap.appendChild(d);
    if(i<5){const l=document.createElement('div');l.className='pdot-line';wrap.appendChild(l);}
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  PAGE 1 — INTRO + ALIEN NAME INPUT
// ═══════════════════════════════════════════════════════════════════════
function renderP1() {
  const nv = { name: alienName||'{name}' };
  document.getElementById('pg1').innerHTML = `
    <div class="card">
      <!--
        PAGE 1 SCENE ILLUSTRATIONS
        Assets:  assets/scene-brushing.svg
                 assets/alien-wonder.svg
        Missing files show a dashed vertical-line placeholder automatically.
      -->
      <div style="display:flex;align-items:flex-end;justify-content:center;
                  gap:24px;margin-bottom:22px;flex-wrap:wrap;padding:8px">
        <div style="min-height:170px;display:flex;align-items:flex-end">
          ${img('scene-brushing','100%')}
        </div>
        <!-- <div style="min-height:170px;display:flex;align-items:flex-end">
          ${img('alien-wonder','100%')}
        </div> -->
      </div>

      <h1>${t('page1.title')}</h1>
      <h2>${t('page1.heading',nv)}</h2>
      ${paras('page1.paragraphs',nv)}

      <hr class="sep">
      <div class="name-fg">
        <label for="aname">${t('page1.name_label')}</label>
        <input id="aname" class="name-input" type="text" maxlength="20"
               autocomplete="off" placeholder="${t('page1.name_placeholder')}"
               oninput="onNameInput()">
        <p class="name-preview" id="name-prev"></p>
      </div>
      <div class="nav">
        <button class="btn btn-primary" id="pg1-next"
                onclick="goPage(2)" disabled>
          ${t('page1.next_button')}
        </button>
      </div>
    </div>`;

  // Restore name if student navigated Back from page 2
  if (alienName) {
    const inp = document.getElementById('aname');
    if (inp) { inp.value = alienName; onNameInput(); }
  }
}

function onNameInput() {
  const inp  = document.getElementById('aname');
  const prev = document.getElementById('name-prev');
  const btn  = document.getElementById('pg1-next');
  if (!inp) return;
  alienName = inp.value.trim();
  if (alienName.length >= 1) {
    prev.textContent = t('page1.name_greeting', {name:alienName});
    btn.disabled = false;
  } else {
    prev.textContent = '';
    btn.disabled = true;
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  PAGE 2 — TWO SEQUENTIAL TRUE/FALSE QUESTIONS
//  Q2 stays hidden until Q1 is answered; the Next button requires both.
// ═══════════════════════════════════════════════════════════════════════
function renderP2() {
  const nv = { name: alienName };

  // Build HTML for one question block (qKey = 'q1' or 'q2')
  function qBlock(qKey, state) {
    const qd     = STORY.page2[qKey];
    const hidden = qKey==='q2' && !p2.q1.answered;
    const optHTML = Object.entries(qd.options).map(([key, o]) => {
      let cls = 'p2-opt';
      if (state.answered) {
        cls += ' revealed';
        cls += key===qd.correct ? ' correct' : ' incorrect';
        if (key===state.selected) cls += ' selected';
      }
      return `<div class="${cls}"
                   onclick="${state.answered?'':` answerP2('${qKey}','${key}')`}">
        ${t(`page2.${qKey}.options.${key}.label`,nv)}
        <div class="p2-why">${t(`page2.${qKey}.options.${key}.why`,nv)}</div>
      </div>`;
    }).join('');

    const isOk  = state.answered && state.selected===qd.correct;
    const fbCls = state.answered ? (isOk?'correct':'wrong') : '';
    const fbMsg = state.answered
      ? t(`page2.${qKey}.feedback_${isOk?'correct':'wrong'}`,nv) : '';

    return `
      <div class="p2-block${hidden?' hidden':''}" id="p2-${qKey}">
        <div class="p2-qnum">${t(`page2.${qKey}.number`)}</div>
        <div class="p2-stmt">${t(`page2.${qKey}.statement`,nv)}</div>
        <div class="p2-opts">${optHTML}</div>
        <div class="p2-fb ${fbCls} ${state.answered?'show':''}">${fbMsg}</div>
      </div>`;
  }

  const nextOk = p2.q1.answered && p2.q2.answered;

  document.getElementById('pg2').innerHTML = `
    <div class="card">
      <!--
        PAGE 2 ILLUSTRATION
        Asset: assets/alien-thinking.svg  — alien with chin on hand, pondering
      -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;flex-wrap:wrap">
        <div style="min-height:80px;display:flex;align-items:center">
          ${img('alien-thinking','100%')}
        </div>
        <div style="flex:1">
          <h2>${t('page2.heading',nv)}</h2>
          <p class="story">${t('page2.intro',nv)}</p>
        </div>
      </div>
      ${qBlock('q1',p2.q1)}
      ${qBlock('q2',p2.q2)}
    </div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="goPage(1)">← Back</button>
      <button class="btn btn-primary" id="pg2-next"
              onclick="goPage(3)" ${nextOk?'':'disabled'}>
        ${t('page2.next_button',nv)}
      </button>
    </div>`;
}

function answerP2(qKey, optKey) {
  p2[qKey] = { answered:true, selected:optKey };
  renderP2(); // full re-render so Q2 can reveal itself
}

// ═══════════════════════════════════════════════════════════════════════
//  PAGE 3 — WHICH METHOD WORKS? (three-option MCQ + image placeholders)
// ═══════════════════════════════════════════════════════════════════════
function renderP3() {
  const nv      = { name:alienName };
  const correct = t('page3.correct');

  const cardsHTML = ['row_order','numbered','both'].map(key => {
    let cls = 'opt-card';
    let verdict = '';
    if (p3.answered) {
      cls += key===correct ? ' revealed correct' : ' revealed incorrect';
      if (key===p3.selected) cls += ' selected';
      verdict = key===correct ? '✅' : '❌';
    }
    return `
      <div class="${cls}" onclick="${p3.answered?'':` answerP3('${key}')`}">
        <div class="opt-img">
          <!--
            METHOD ILLUSTRATION ASSETS:
              assets/method-row-order.svg  — diagram of left-to-right row scan
              assets/method-numbered.svg   — diagram of numbered teeth 1-8
              assets/method-both.svg       — both-work checkmark or combined image
          -->
          ${img(`method-${key.replace('_','-')}`,'78px')}
          <span class="opt-verdict">${verdict}</span>
        </div>
        <p class="opt-label">${t(`page3.options.${key}.label`,nv)}</p>
        <p class="opt-desc">${t(`page3.options.${key}.desc`,nv)}</p>
        <p class="opt-why">${t(`page3.options.${key}.why`,nv)}</p>
      </div>`;
  }).join('');

  const fbHTML = p3.answered ? (() => {
    const ok  = p3.selected===correct;
    const msg = t(`page3.feedback_${ok?'correct':'wrong'}`,nv);
    return `<div class="fb-box ${ok?'ok':'bad'}">
      <div class="fb-ico">${ok?'🎉':'🤔'}</div>
      <div class="fb-text">${msg}</div>
    </div>`;
  })() : '';

  document.getElementById('pg3').innerHTML = `
    <div class="card">
      <h2>${t('page3.heading',nv)}</h2>
      <p class="story">${t('page3.subtitle',nv)}</p>
      <div class="opts-grid">${cardsHTML}</div>
      ${fbHTML}
    </div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="goPage(2)">← Back</button>
      <button class="btn btn-primary" ${p3.answered?'':'disabled'}
              onclick="initRound(0); goPage(4);">
        ${t('page3.next_button',nv)}
      </button>
    </div>`;
}

function answerP3(key) {
  p3 = { answered:true, selected:key };
  renderP3();
}

// ═══════════════════════════════════════════════════════════════════════
//  PAGE 4 — INTERACTIVE TOOTH PRACTICE (four rounds)
// ═══════════════════════════════════════════════════════════════════════

/** Prepare state for round `idx`. Call before renderP4(). */
function initRound(idx) {
  p4.roundIdx = idx;
  p4.clicked  = [];
  p4.hintOn   = false;
  const round = ROUNDS[idx];
  if (round.type === 'numbered') {
    // Fisher-Yates shuffle: assign numbers 1-8 to the 8 teeth randomly
    const nums = [1,2,3,4,5,6,7,8];
    for (let i=nums.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [nums[i],nums[j]] = [nums[j],nums[i]];
    }
    p4.numbers = {};
    TEETH.forEach((tooth,i) => { p4.numbers[tooth.id] = nums[i]; });
    // Derive the expected sequence by sorting teeth by their assigned number
    p4.seq = TEETH.map(t=>t.id).sort((a,b) =>
      round.dir==='asc'
        ? p4.numbers[a]-p4.numbers[b]
        : p4.numbers[b]-p4.numbers[a]
    );
  } else {
    p4.numbers = null;
    p4.seq     = round.seq;
  }
}

/** Full HTML build for page 4. Called once per round entry. */
function renderP4() {
  const nv    = { name:alienName };
  const rIdx  = p4.roundIdx;
  const round = ROUNDS[rIdx];
  const rid   = round.id;
  const isNum = round.type==='numbered';

  // ── Instruction bubble ──────────────────────────────────────────
  const instrHTML = `
    <div class="instr-wrap">
      <div class="instr-ai">
        <!--
          PAGE 4 TEACHING ALIEN
          Asset: assets/alien-teaching.svg
        -->
        ${img('alien-teaching','80px')}
      </div>
      <div class="instr-bubble">
        <div class="instr-title">${t(`page4.rounds.${rid}.title`,nv)}</div>
        ${t(`page4.rounds.${rid}.instruction`,nv)}
      </div>
    </div>`;

  // ── One tooth element ───────────────────────────────────────────
  // Each tooth has a stable id on both the wrapper (tw-) and the body (tb-).
  // The body carries the state class (s-default / s-hint / s-done / s-all).
  // Three inner spans: tooth-pos (position label), tooth-num (assigned number),
  // tooth-step (the step number shown after clicking, initially hidden).
  function toothHTML(tooth) {
    const inner = isNum
      ? `<span class="tooth-num"  id="tnum-${tooth.id}">${p4.numbers[tooth.id]}</span>`
      : `<span class="tooth-pos"  id="tpos-${tooth.id}">${tooth.label}</span>`;
    return `
      <div class="tooth-wrap" id="tw-${tooth.id}"
           onclick="clickTooth('${tooth.id}')">
        <div class="tooth-body tooth-${tooth.row} s-default" id="tb-${tooth.id}">
          ${inner}
          <span class="tooth-step" id="ts-${tooth.id}"></span>
        </div>
      </div>`;
  }

  const topHTML = TEETH.filter(t=>t.row==='top').map(toothHTML).join('');
  const botHTML = TEETH.filter(t=>t.row==='bottom').map(toothHTML).join('');

  const mouthHTML = `
    <div class="mouth-outer">
      <div class="mouth-inner">
        <div class="teeth-row">${topHTML}</div>
        <div class="gum gum-top"></div>
        <div class="gum gum-bottom"></div>
        <div class="teeth-row">${botHTML}</div>
      </div>
    </div>`;

  // Eight progress dots below the mouth
  const dotsHTML = Array.from({length:8},(_,i)=>`<div class="sdot" id="sd-${i}"></div>`).join('');

  // The Back button: goes to the previous round (not page 3) if past round 0
  const backAction = rIdx===0
    ? 'goPage(3)'
    : `initRound(${rIdx-1}); renderP4();`;

  document.getElementById('pg4').innerHTML = `
    <div class="card">
      <h2>${t('page4.heading',nv)}</h2>
      <p class="story">${t('page4.intro',nv)}</p>
      <div class="round-badge">🦷 ${t(`page4.rounds.${rid}.badge`,nv)}</div>
    </div>

    ${instrHTML}

    <div class="card" style="padding:18px">
      ${mouthHTML}
      <div class="step-dots">${dotsHTML}</div>
      <div class="step-label" id="step-lbl">
        ${t('page4.step_label',{done:0,total:8})}
      </div>
      <div class="round-controls">
        <button class="btn btn-ghost btn-sm" id="hint-btn" onclick="toggleHint()">
          ${t('page4.hint_on',nv)}
        </button>
        <button class="btn btn-ghost btn-sm" onclick="resetRound()">
          ${t('page4.reset',nv)}
        </button>
      </div>
      <!-- Round success message is injected here -->
      <div id="round-ok"></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" onclick="${backAction}">← Back</button>
      <button class="btn btn-primary" id="pg4-fin"
              onclick="goPage(5)" disabled>
        ${t('page4.finish',nv)}
      </button>
    </div>`;

  // Replay any existing progress (student navigated Back mid-round)
  p4.clicked.forEach((id,i) => domDone(id, i+1));
  syncDots(p4.clicked.length);

  // If this round was already completed before entering it again
  if (p4.done[rIdx]) markRoundComplete(true);

  // Restore hint highlight if it was active
  if (p4.hintOn) applyHint();
}

// ── Direct DOM patchers — called during interaction, never trigger re-render ──

/** Mark tooth `id` as correctly brushed: green state + step number. */
function domDone(id, step) {
  const body = document.getElementById(`tb-${id}`);
  const wrap = document.getElementById(`tw-${id}`);
  const sNum = document.getElementById(`ts-${id}`);
  if (!body) return;
  // Replace whichever state class is currently set with s-done
  body.className = body.className.replace(/\bs-\w+/, 's-done');
  if (sNum) { sNum.textContent = step; sNum.style.display='block'; }
  if (wrap) wrap.classList.add('tw-done');
}

/** Flash tooth `id` red briefly on a wrong click, then restore default. */
function domWrong(id) {
  const body = document.getElementById(`tb-${id}`);
  if (!body) return;
  body.classList.add('s-wrong');
  setTimeout(() => body.classList.remove('s-wrong'), 580);
}

/** Clear any existing hint highlight, then highlight the next tooth if hint is on. */
function applyHint() {
  document.querySelectorAll('.tooth-body.s-hint').forEach(el =>
    el.classList.replace('s-hint','s-default')
  );
  if (!p4.hintOn) return;
  const nextId = p4.seq[p4.clicked.length];
  if (!nextId) return;
  const body = document.getElementById(`tb-${nextId}`);
  if (body && body.classList.contains('s-default'))
    body.classList.replace('s-default','s-hint');
}

/** Update the 8 step-dots and the "X / 8 teeth brushed" counter. */
function syncDots(n) {
  for (let i=0;i<8;i++) {
    const d = document.getElementById(`sd-${i}`);
    if (!d) continue;
    d.className = 'sdot' + (i<n ? ' sd-done' : i===n&&n<8 ? ' sd-cur' : '');
  }
  const lbl = document.getElementById('step-lbl');
  if (lbl) lbl.textContent = t('page4.step_label',{done:n,total:8});
}

/**
 * Show the round success message and wire up the "Next Round" button.
 * `silent = true` skips DOM injection — used when replaying completed
 * state after the student presses Back and re-enters a finished round.
 */
function markRoundComplete(silent=false) {
  const nv     = { name:alienName };
  const rIdx   = p4.roundIdx;
  const rid    = ROUNDS[rIdx].id;
  const isLast = rIdx === ROUNDS.length-1;

  // Upgrade every tooth to the brighter "all-done" glow state
  TEETH.forEach(tooth => {
    const body = document.getElementById(`tb-${tooth.id}`);
    if (body) body.classList.replace('s-done','s-all');
  });

  if (!silent) {
    const area = document.getElementById('round-ok');
    if (area) {
      area.innerHTML = `
        <div class="round-ok">
          <span class="ok-ico">🦷✨</span>
          <p>${t('page4.all_done',nv)}</p>
          <p>${t(`page4.rounds.${rid}.success`,nv)}</p>
          <button class="btn btn-primary"
                  onclick="${isLast ? 'goPage(5)' : `initRound(${rIdx+1}); renderP4();`}">
            ${isLast ? t('page4.finish',nv) : t('page4.next_round',nv)}
          </button>
        </div>`;
    }
  }

  // Enable the persistent nav "finish" button on the last round
  if (isLast) {
    const btn = document.getElementById('pg4-fin');
    if (btn) btn.disabled = false;
  }

  // Disable hint and reset once done
  const hb = document.getElementById('hint-btn');
  if (hb) hb.disabled = true;
}

// ── Core click handler ─────────────────────────────────────────────────
function clickTooth(id) {
  if (p4.done[p4.roundIdx]) return; // round already finished

  const expected = p4.seq[p4.clicked.length]; // the tooth we're waiting for

  if (id === expected) {
    // ✓ Correct click
    p4.clicked.push(id);
    const step = p4.clicked.length;
    domDone(id, step);
    syncDots(step);
    if (step === 8) {
      p4.done[p4.roundIdx] = true;
      markRoundComplete();
    } else if (p4.hintOn) {
      applyHint(); // advance the yellow highlight to the next tooth
    }
  } else {
    // ✗ Wrong click — flash red but don't advance
    domWrong(id);
  }
}

function toggleHint() {
  p4.hintOn = !p4.hintOn;
  const btn = document.getElementById('hint-btn');
  if (btn) btn.textContent = t(p4.hintOn ? 'page4.hint_off' : 'page4.hint_on', {name:alienName});
  applyHint();
}

function resetRound() {
  p4.clicked = [];
  p4.hintOn  = false;
  initRound(p4.roundIdx); // regenerate numbers for numbered rounds
  renderP4();
}

// ═══════════════════════════════════════════════════════════════════════
//  PAGE 5 — FOR-LOOP LESSON + PSEUDOCODE
// ═══════════════════════════════════════════════════════════════════════
function renderP5() {
  const nv          = { name:alienName };
  const completedN  = p4.done.filter(Boolean).length;
  const medal       = completedN===4 ? '🌟' : completedN>=3 ? '🎉' : completedN>=2 ? '🦷' : '💪';

  // Syntax-highlighted pseudocode — content comes from YAML keys
  const pc = (k) => t(`page5.${k}`,nv);
  const codeHTML = `
    <div class="pc-wrap"><pre
><span class="pc-cm">${pc('pc_c1')}</span>
<span class="pc-br">${pc('pc_l1')}</span>

<span class="pc-kw">for</span> tooth <span class="pc-kw">in</span> teeth<span class="pc-br">:</span>
    <span class="pc-fn">brush(tooth)</span>

<span class="pc-cm">${pc('pc_c2')}</span>
<span class="pc-br">${pc('pc_l2')}</span>

<span class="pc-kw">for</span> tooth <span class="pc-kw">in</span> teeth<span class="pc-br">:</span>
    <span class="pc-fn">brush(tooth)</span></pre></div>`;

  const rawIng = t('page5.ingredients',nv);
  const ingHTML = (Array.isArray(rawIng) ? rawIng : [rawIng])
    .map(i=>`<p class="story" style="margin-bottom:6px">${i}</p>`)
    .join('');

  document.getElementById('pg5').innerHTML = `
    <div class="card" style="text-align:center">
      <span class="medal">${medal}</span>
      <h1>${t('page5.heading',nv)}</h1>
      <!--
        PAGE 5 CELEBRATION ALIEN
        Asset: assets/alien-happy.svg  — alien beaming, maybe holding a toothbrush
      -->
      <div style="margin:14px 0">${img('alien-happy','100%')}</div>
    </div>

    <div class="card">
      <h3>${t('page5.intro_heading',nv)}</h3>
      ${paras('page5.paragraphs',nv)}
    </div>

    <div class="card">
      <h3 style="margin-bottom:6px">${t('page5.pseudocode_intro',nv)}</h3>
      ${codeHTML}
    </div>

    <div class="hl-box">
      <h3 style="margin-bottom:10px">${t('page5.ingredients_heading',nv)}</h3>
      ${ingHTML}
    </div>

    <div class="card" style="background:var(--surface2)">
      <h4 style="margin-bottom:8px">🔢 The maths connection</h4>
      <p class="story" style="font-size:.9rem;color:var(--text-dim)">
        ${t('page5.math_note',nv)}
      </p>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" onclick="goPage(4)">← Back</button>
      <button class="btn btn-primary" onclick="restartAll()">
        ${t('page5.restart_btn',nv)}
      </button>
    </div>`;

  if (completedN===4) launchConfetti();
}

// ═══════════════════════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════════════════════
function launchConfetti() {
  const colors=['#ffd93d','#39ff14','#ff6b9d','#4cc9f0','#c77dff','#ff9f43','#55efc4'];
  for (let i=0;i<80;i++) {
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw';
    p.style.width=(7+Math.random()*8)+'px';
    p.style.height=(7+Math.random()*8)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration=(2.5+Math.random()*3)+'s';
    p.style.animationDelay=Math.random()*1.5+'s';
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  RESTART
// ═══════════════════════════════════════════════════════════════════════
function restartAll() {
  alienName = '';
  p2 = { q1:{answered:false,selected:null}, q2:{answered:false,selected:null} };
  p3 = { answered:false, selected:null };
  p4 = { roundIdx:0, done:[false,false,false,false], seq:[], clicked:[], numbers:null, hintOn:false };
  goPage(1);
}

// ═══════════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════════
(async function boot() {
  await loadStory();
  renderP1();
  buildProgress();
})();
</script>
