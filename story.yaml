page1:
  title: "Die Zahn-Schleife <span class='ei'>🦷</span>"
  heading: "<span class='ei'>🛸</span> <em>{name}</em> möchte Zähneputzen lernen!"
  paragraphs:
    - "Du putzt dir gerade die Zähne und möchtest dem <em>Alien-Baby</em> beibringen, das Gleiche zu tun. Du fragst dich: \"Was ist, wenn ich dem <em>Alien-Baby</em> beibringe, wie man einen Zahn vom Zahnfleisch bis zur Spitze putzt? Kann es dann die restlichen Zähne nach meiner Anleitung putzen? Woher weiß es, welche Zähne es schon geputzt hat?\""
    - "Das <em>Alien-Baby</em> hat nur 8 Zähne, vier oben und vier unten. Wenn es ohne ein erkennbares Muster anfängt zu putzen, wird es nie wissen, welche Zähne es schon geputzt hat."
    - "Du fragst dich: \"Kann ich ihm beibringen, wie man einen Zahn richtig putzt, und dann wiederholt es das für alle, bis jeder Zahn geputzt ist?\" Das nennt man beim Programmieren von Computern eine <b>For-Schleife</b> (oder Zählschleife). Warum eine <b>For-Schleife</b>? Weil man dieselbe Sache <b>für</b> eine bestimmte Anzahl von Wiederholungen macht."
  name_label: "✏️ Gib deinem Alien einen Namen:"
  name_placeholder: "z.B. Zorp, Pip, Nova…"
  name_greeting: "👾 Hallo, {name}! Lass uns diese Zähne in einer Schleife durchgehen!"
  next_button: "Lektion starten! 🦷"

page2:
  heading: "<b>Zuerst</b> lass uns gut nachdenken…"
  intro: "<em>{name}</em> hat 8 Zähne — 4 oben, 4 unten. Bevor wir Regeln aufschreiben, lass uns überlegen, <em>warum</em> Regeln überhaupt wichtig sind."
  q1:
    number: "Frage 1"
    statement: "<em>{name}</em> beschließt, einfach zufällig zu putzen — ohne Plan, die Bürste bewegt sich einfach dorthin, wo es sich richtig anfühlt. Es ist fertig und denkt: <em>\"Ich muss jetzt bestimmt jeden Zahn erwischt haben.\"</em> Ist das eine sichere Annahme?"
    options:
      yes:
        label: "✅ Ja — zufällig ist völlig in Ordnung!"
        why: "Denk noch mal nach! Ohne einen Plan könnte <em>{name}</em> denselben Zahn fünfmal putzen und einen anderen komplett auslassen. Es gibt nichts, das mitzählt."
      no:
        label: "❌ Nein — es könnte Zähne verfehlen!"
        why: "Richtig! Ohne eine Regel kann <em>{name}</em> nicht wissen, welche Zähne schon geputzt wurden. Einige könnten für immer schmutzig bleiben!"
    correct: "no"
    feedback_correct: "Richtig! Zufälliges Putzen bietet keine Garantie. <em>{name}</em> könnte immer wieder zum selben Zahn zurückkehren, während ein anderer schmutzig bleibt. Ohne eine Regel gibt es einfach keine Möglichkeit, sicher zu sein."
    feedback_wrong: "Denk genau nach: Wenn <em>{name}</em> die Bürste einfach dorthin bewegt, wo es sich gut anfühlt, was hindert es daran, denselben Zahn zweimal zu putzen und einen anderen komplett zu verpassen? Nichts zählt mit!"
  q2:
    number: "Frage 2"
    statement: "Wenn <em>{name}</em> einer klaren Regel folgt — zum Beispiel: <em>\"Starte oben links, gehe nach rechts, dann unten links, gehe nach rechts\"</em> — kann es garantieren, dass jeder Zahn genau einmal geputzt wird."
    options:
      yes:
        label: "✅ Wahr — Regeln garantieren es!"
        why: "Richtig! Eine klare Regel sagt <em>{name}</em> genau, wo es als Nächstes hingehen soll. Kein Zahn wird ausgelassen, kein Zahn wird zweimal geputzt."
      no:
        label: "❌ Falsch — Regeln helfen nicht"
        why: "Eigentlich helfen Regeln sehr viel! Jede Regel, die jeden Zahn genau einmal besucht, ist eine absolute Garantie — kein Zahn wird vergessen."
    correct: "yes"
    feedback_correct: "Ganz genau! Eine Regel ist eine Garantie. \"Von links nach rechts, erst oben, dann unten\" — wenn <em>{name}</em> das komplett befolgt, wird jeder einzelne Zahn geputzt. Das ist es, was <b>Algorithmen</b> tun: Sie beseitigen Unsicherheiten."
    feedback_wrong: "Stell dir das wie eine Einkaufsliste in einer bestimmten <b>Reihenfolge</b> vor. Wenn du der Liste von oben nach unten folgst, bekommst du garantiert jeden Artikel. Eine Zahnputz-Regel funktioniert genauso!"
  next_button: "Ich bin überzeugt — zeig mir die Methoden! →"

page3:
  heading: "Welche Methode garantiert saubere Zähne?"
  subtitle: "Beide Methoden unten folgen einer Regel. Spielt es eine Rolle, <em>welche</em> Regel <em>{name}</em> wählt, oder funktioniert jede vollständige Regel?"
  options:
    row_order:
      label: "Reihe für Reihe"
      desc: "Obere Reihe von links nach rechts: T1, T2, T3, T4. Dann die untere Reihe von links nach rechts: B1, B2, B3, B4."
      why: "Das funktioniert! Ein Durchgang von links nach rechts in jeder Reihe deckt jeden Zahn genau einmal ab."
    numbered:
      label: "Nach Zahlen"
      desc: "Mache ein Foto von den Zähnen des <em>Alien-Babys</em>, schreibe eine eindeutige Zahl von 1-8 auf jeden Zahn (in beliebiger <b>Reihenfolge</b>) auf dem Foto. Putze #1, dann #2, bis #8."
      why: "Das funktioniert auch! Den eindeutigen Zahlen 1→8 zu folgen, garantiert, dass jeder Zahn abgedeckt wird."
    both:
      label: "Beide funktionieren! ✓"
      desc: "Jede Regel, die jeden Zahn genau einmal besucht — in beliebiger <b>Reihenfolge</b> — garantiert eine komplette Reinigung."
      why: "Richtig! Die Methode spielt keine Rolle. Wichtig ist nur, dass die Regel jedes Element genau einmal besucht."
  correct: "both"
  feedback_correct: "Ganz genau! Beide sind gültige <b>Algorithmen</b>. Die wichtigste Erkenntnis ist nicht, <em>welche</em> <b>Reihenfolge</b> du benutzt — sondern dass die Regel jedes Element in der Sammlung besuchen muss. Beim Programmieren nennen wir das eine <b>For-Schleife</b>: Wiederhole eine Aktion <b>für</b> jedes Element in einer Liste und stelle sicher, dass kein Element ausgelassen wird."
  feedback_wrong: "Denk mal drüber nach: Wenn <em>{name}</em> eine der beiden Regeln perfekt und vollständig befolgt, kann es dann jemals einen Zahn verpassen? Kann es jemals einen Zahn zweimal putzen? Wenn beide eine vollständige Abdeckung garantieren, sind vielleicht beide gültig…"
  next_button: "Zeit, das Zähne-Klicken zu üben! 🦷"

page4:
  heading: "<span class='ei'>🦷</span> Übungszeit — Folge der Regel!"
  intro: "Klicke die Zähne in genau der <b>Reihenfolge</b> an, die die Regel beschreibt. Nutze den Hinweis-Button, wenn du nicht weiterkommst — er wird den nächsten Zahn, den du klicken musst, gelb markieren."
  rounds:
    row_order:
      badge: "Runde 1 von 4"
      title: "Reihe für Reihe"
      instruction: "Beginne in der <b>oberen Reihe</b>, klicke von <em>links nach rechts</em>: T1 → T2 → T3 → T4. Gehe dann zur <b>unteren Reihe</b> und klicke wieder von <em>links nach rechts</em>: B1 → B2 → B3 → B4."
      success: "🎉 Perfekt! <em>{name}</em> hat alle 8 Zähne geputzt, indem es von links nach rechts, Reihe für Reihe vorgegangen ist. Das ist eine klassische <b>For-Schleife</b> — jedes Element in einer sauberen, vorhersehbaren <b>Reihenfolge</b> besuchen!"
    numbered_asc:
      badge: "Runde 2 von 4"
      title: "Nach Zahlen (1 → 8)"
      instruction: "Jeder Zahn hat eine zufällige Zahl zwischen 1 und 8 bekommen — keine zwei Zähne haben dieselbe Zahl. Finde den Zahn mit der Nummer #1 und klicke ihn <b>zuerst</b> an. Dann #2, dann #3 — mach weiter, bis du #8 erreichst."
      success: "🔢 Brillant! <em>{name}</em> ist den Zahlen 1→8 gefolgt und hat jeden Zahn geputzt. Die Zahlen wirken wie ein Index — eine Möglichkeit, jedes Element in einer Liste zu benennen, damit man sie alle in der richtigen <b>Reihenfolge</b> besuchen kann!"
    zigzag:
      badge: "Runde 3 von 4"
      title: "Die Zickzack-Regel"
      instruction: "Diese Regel macht Zickzack zwischen den Reihen — ungewöhnlich, aber vollständig! Folge genau dieser Reihenfolge: <em>Obere Reihe rechte Seite:</em> T4 → T3. Dann <em>Untere Reihe linke Seite:</em> B1 → B2. Dann <em>Obere Reihe linke Seite:</em> T2 → T1. Zum Schluss <em>Untere Reihe rechte Seite:</em> B3 → B4."
      success: "🌟 Unglaublich! Sogar dieser ungewöhnliche Zickzack hat alle 8 Zähne abgedeckt — weil die Regel <b>vollständig</b> war. In der Informatik ist jede Schleife, die jedes Element genau einmal besucht, gültig, egal in welcher <b>Reihenfolge</b>!"
    numbered_desc:
      badge: "Runde 4 von 4"
      title: "Nach Zahlen (8 → 1)"
      instruction: "Neue zufällige Zahlen — wieder alle unterschiedlich! Aber dieses Mal beginnst du bei dem Zahn mit der Nummer <b>#8</b> und zählst <em>rückwärts</em>: 8 → 7 → 6 → … bis hinunter zur <b>#1</b>. Eine Rückwärts-Schleife ist immer noch eine gültige Schleife!"
      success: "⬇️ Exzellent! Rückwärts von 8 bis 1 zu zählen hat immer noch jeden Zahn abgedeckt. Die Richtung einer Schleife — vorwärts oder rückwärts — spielt keine Rolle, solange <b>jedes Element</b> <b>genau einmal</b> besucht wird!"
  hint_on:  "💡 Hinweis zeigen"
  hint_off: "💡 Hinweis verbergen"
  reset:    "↺ Runde neustarten"
  step_label: "{done} / {total} Zähne geputzt"
  all_done: "🦷✨ Alle 8 Zähne sind sauber!"
  next_round: "Nächste Runde →"
  finish: "Schau dir die große Lektion an! 🎓"

page5:
  heading: "<span class='ei'>🎓</span> <em>{name}</em> hat For-Schleifen gelernt!"
  intro_heading: "Die große Idee"
  paragraphs:
    - "Eine <b>For-Schleife</b> ist eine Anweisung, die besagt: <em>\"Für jedes Element in einer Sammlung, mache diese Aktion.\"</em> Was <em>{name}</em> gerade geübt hat, war genau das — <b>für</b> jeden Zahn im Mund, putze ihn."
    - "Der Schleife ist die <b>Reihenfolge</b> egal — von links nach rechts, nach Zahlen, Zickzack oder sogar rückwärts — solange die Regel jedes Element genau einmal besucht und aufhört, wenn alle Elemente erledigt sind, ist es eine gültige <b>For-Schleife</b>. Die Garantie der Vollständigkeit macht sie so mächtig."
    - "In echten Programmen könnte eine <b>For-Schleife</b> sagen: <b>Für</b> jedes Foto auf deinem Handy, wende einen Filter an. Oder: <b>Für</b> jeden Schüler in der Klassenliste, sende eine E-Mail. Der Ablauf ist immer derselbe — eine Sammlung, eine Aktion, jedes Element wird besucht."
  pseudocode_intro: "In einer Programmiersprache sieht das, was <em>{name}</em> gemacht hat, so aus:"
  pc_c1: "# Methode 1 — von links nach rechts, Reihe für Reihe"
  pc_l1: "teeth = [T1, T2, T3, T4, B1, B2, B3, B4]"
  pc_c2: "# Methode 2 — nach Zahlen (beliebige Reihenfolge, alle 8 vorhanden)"
  pc_l2: "teeth = [T3, B2, T1, B4, T4, B1, T2, B3]  # gemischt, aber vollständig"
  ingredients_heading: "Jede <b>For-Schleife</b> hat genau drei Zutaten:"
  ingredients:
    - "📋 Eine Sammlung — die Liste der Dinge, die bearbeitet werden sollen (unsere 8 Zähne)"
    - "🔁 Eine Aktion — was mit jedem Element gemacht werden soll (putzen)"
    - "✅ Eine Stopp-Bedingung — wenn jedes Element besucht wurde, endet die Schleife automatisch"
  math_note: "In der Mathematik taucht die Idee der <b>For-Schleife</b> als Sigma-Symbol (Σ) auf, was bedeutet: 'Addiere das <b>für</b> jeden Wert von 1 bis n'. Die Schleifenstruktur ist eine der universellsten Ideen in der Mathematik und Informatik."
  restart_btn: "🔄 Starte das Abenteuer noch einmal!"
